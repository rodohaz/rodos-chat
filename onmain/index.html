<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Ollama Chat Game (exemplo)</title>
  <style>
    body {font-family: Arial, sans-serif; margin: 12px;}
    #game {display:flex; gap:12px;}
    #left {width:320px;}
    #chat {flex:1; border:1px solid #ddd; padding:8px; min-height:400px; background-size:cover; background-position:center;}
    .message {border-bottom:1px solid #eee; padding:6px 0;}
    .avatar {width:36px;height:36px;border-radius:6px;object-fit:cover;margin-right:8px;}
    #players {margin-top:8px;}
  </style>
</head>
<body>
  <h2>Ollama Chat Game — Exemplo</h2>
  <div id="lobby">
    <input id="roomId" placeholder="Room ID" value="room1"/>
    <input id="name" placeholder="Seu nome" value="Rodo"/>
    <input id="avatarFile" type="file" accept="image/*"/>
    <button id="createRoom">Criar Sala</button>
    <button id="joinRoom">Entrar</button>
    <button id="createBot">Criar Bot</button>
    <br/>
    <label>Background (client-side): <input id="bgFile" type="file" accept="image/*"/></label>
  </div>

  <div id="game" style="display:none;">
    <div id="left">
      <div>
        <strong>Jogadores</strong>
        <div id="players"></div>
      </div>
      <hr/>
      <div>
        <strong>Editar personagem</strong>
        <input id="charName" placeholder="Nome do personagem"/>
        <input id="charAvatar" type="file" accept="image/*"/>
        <select id="expression">
          <option value="neutral">Neutro</option>
          <option value="happy">Feliz</option>
          <option value="angry">Bravo</option>
          <option value="sad">Triste</option>
        </select>
        <button id="applyChar">Aplicar</button>
      </div>
      <hr/>
      <div>
        <button id="startTurns">Iniciar Ciclo de Turnos</button>
        <div>Turno atual: <span id="turnIndex">-</span></div>
      </div>
    </div>

    <div>
      <div id="chat" tabindex="0"></div>
      <div style="margin-top:8px;">
        <input id="msgInput" placeholder="Digite a mensagem..." style="width:60%"/>
        <button id="send" disabled>Enviar (só no seu turno)</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/client.js"></script>
</body>
</html>
